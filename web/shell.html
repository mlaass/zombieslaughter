<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Zombie Slaughter</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{background:#000;image-rendering:pixelated;max-width:100vw;max-height:100vh;outline:none}
  #status{position:fixed;left:0;right:0;bottom:12px;text-align:center;
          font:14px monospace;color:#8ab;pointer-events:none}
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
<div id="status">loading…</div>
<script>
  var statusEl = document.getElementById('status');
  var Module = {
    canvas: document.getElementById('canvas'),
    setStatus: function (t) { if (statusEl) statusEl.textContent = t; if (!t) statusEl && statusEl.remove(); },
    print: function (t) { console.log(t); },
    printErr: function (t) { console.error(t); },
  };
  Module.canvas.addEventListener('click', function(){ Module.canvas.focus(); });
</script>
{{{ SCRIPT }}}
</body>
</html>
